<!-- Top Bar -->

<div id="topbar">
  <div class="logo">POINT<span>LESS</span></div>
  <div class="btn-group">
    <span class="mode-badge" id="mode-badge">ADMIN</span>
    <button class="btn btn-next" id="btn-next" onclick="nextQuestion()" style="display:none">Next →</button>
    <button class="btn btn-mode" onclick="toggleMode()">▶ Toggle Mode</button>
    <button class="btn btn-danger" onclick="confirmClearAll()">✕ Clear All</button>
  </div>
</div>

<div id="main">

  <!-- ADMIN MODE -->

  <div id="admin-mode">
    <div class="admin-header">Creator Mode</div>
    <div class="admin-sub">Build your question board. All questions auto-save to localStorage.</div>

```
<div class="form-section">
  <h3>Add New Question</h3>
  <label>Question Title</label>
  <input type="text" id="q-title" placeholder="e.g. Name a capital city of Europe">

  <label>Answers & Points (Answer : Points)</label>
  <div id="answers-container">
    <div class="answer-row">
      <input type="text" placeholder="Answer" class="ans-text">
      <input type="number" placeholder="Pts" class="ans-pts" min="0" max="100">
      <button class="btn-remove-answer" onclick="removeAnswerRow(this)">×</button>
    </div>
  </div>
  <button class="btn-add-answer" onclick="addAnswerRow()">+ Add Answer</button>

  <button class="btn-save-q" onclick="saveQuestion()">Save Question</button>
</div>

<hr class="section-divider">

<div class="form-section">
  <h3>Saved Questions (<span id="q-count">0</span>)</h3>
  <div id="saved-list" class="saved-list">
    <div class="empty-state">No questions saved yet.</div>
  </div>
</div>
```

  <div id="play-mode" style="display:none">

```
<div class="play-question" id="play-q-area">
  <!-- dynamically filled -->
</div>

<div class="score-area">
  <div class="column-side-labels" id="side-labels">
    <!-- dynamically filled -->
  </div>

  <div class="column-wrap">
    <div class="column-score-num" id="score-display">—</div>
    <div class="score-column-outer">
      <div class="score-column-fill" id="score-fill"></div>
      <div class="tick-marks" id="tick-marks"></div>
      <div class="col-glow-effect" id="col-glow"></div>
    </div>
  </div>
</div>

<div class="answer-input-area">
  <div class="answer-input-wrap">
    <input type="text" id="answer-input" placeholder="TYPE YOUR ANSWER" autocomplete="off">
    <button class="btn-submit" id="btn-submit" onclick="submitAnswer()">CHECK</button>
  </div>
  <div class="result-display" id="result-display"></div>
</div>
