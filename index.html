<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POINTLESS — Game Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #03040f;
            --bg-mid: #060a1e;
            --bg-panel: rgba(10, 15, 45, 0.85);
            --blue-glow: #1a4fff;
            --cyan: #00d4ff;
            --gold: #ffd700;
            --gold-glow: #ffaa00;
            --red: #ff2233;
            --white: #f0f4ff;
            --muted: #7080aa;
            --border: rgba(0, 180, 255, 0.18);
            --col-fill: linear-gradient(180deg, #00d4ff 0%, #1a4fff 60%, #0a0030 100%);
            --col-empty: #0a0d1e;
            --col-width: 90px;
            --col-height: 520px;
            --transition-drop: 0.06s linear;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-deep);
            color: var(--white);
            font-family: 'Barlow Condensed', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #stars {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(26,79,255,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,212,255,0.08) 0%, transparent 60%);
        }

        #root {
            position: relative; z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px 60px;
            display: flex; flex-direction: column; gap: 24px;
        }

        /* ADMIN PANEL STYLING */
        #admin-toggle {
            align-self: flex-end; background: none; border: 1px solid var(--border);
            color: var(--muted); font-family: 'Share Tech Mono', monospace;
            font-size: 11px; letter-spacing: 2px; padding: 6px 16px;
            cursor: pointer; border-radius: 2px; transition: all .2s;
        }
        #admin-toggle:hover { color: var(--cyan); border-color: var(--cyan); }

        #admin-panel {
            background: var(--bg-panel); border: 1px solid var(--border);
            border-radius: 8px; padding: 24px; backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(0,100,255,0.08); overflow: hidden;
            max-height: 1000px; transition: all .4s ease;
        }
        #admin-panel.hidden { max-height: 0; padding: 0; opacity: 0; border: none; }

        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .inp {
            background: rgba(0,20,60,0.7); border: 1px solid var(--border);
            border-radius: 4px; color: var(--white); padding: 8px 12px; width: 100%; outline: none;
        }

        /* GAME BOARD STYLING */
        #game-board {
            display: grid; grid-template-columns: var(--col-width) 1fr; gap: 32px; align-items: start;
        }

        #column-outer {
            width: var(--col-width); height: var(--col-height);
            background: var(--col-empty); border: 2px solid rgba(0,180,255,0.25);
            border-radius: 6px; position: relative; overflow: hidden;
        }

        #column-fill {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: var(--col-fill); transition: height var(--transition-drop);
            height: 100%; box-shadow: 0 -8px 30px rgba(0,212,255,0.5);
        }

        #score-notch {
            position: absolute; right: -28px; width: 32px; height: 26px;
            background: var(--bg-deep); border: 1px solid var(--cyan);
            color: var(--cyan); font-family: 'Share Tech Mono', monospace;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
        }

        #display-panel {
            background: rgba(5,8,28,0.9); border: 1px solid var(--border);
            border-radius: 8px; padding: 28px; min-height: 400px;
        }

        #q-display {
            font-family: 'Bebas Neue', sans-serif; font-size: 40px;
            margin: 20px 0; color: var(--white); text-shadow: 0 0 20px var(--blue-glow);
        }

        #submit-btn {
            background: var(--blue-glow); color: white; border: none;
            padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 4px;
        }

        #pointless-overlay {
            position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #pointless-overlay.active { display: flex; }
        #pointless-banner { font-family: 'Bebas Neue', sans-serif; font-size: 120px; color: var(--gold); }
        
        .btn { cursor: pointer; padding: 8px 16px; border-radius: 4px; border: none; font-weight: bold; }
        .btn-cyan { background: var(--cyan); color: black; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--white); }

        #red-flash { position: fixed; inset: 0; background: red; opacity: 0; pointer-events: none; z-index: 99; }
        .flash-anim { animation: flash 0.5s ease-out; }
        @keyframes flash { 0% { opacity: 0.5; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="stars"></div>
    <div id="red-flash"></div>

    <div id="pointless-overlay">
        <div id="pointless-banner">POINTLESS</div>
        <button class="btn btn-cyan" onclick="document.getElementById('pointless-overlay').classList.remove('active')">CONTINUE</button>
    </div>

    <div id="root">
        <button id="admin-toggle">⚙ ADMIN DASHBOARD</button>

        <section id="admin-panel" class="hidden">
            <div class="admin-grid">
                <div>
                    <label>Question Title</label>
                    <input id="q-title-inp" class="inp" placeholder="e.g. European Capitals">
                    <div id="answers-builder" style="margin-top: 10px;"></div>
                    <button class="btn btn-ghost" onclick="createAnswerRow()" style="margin-top: 10px;">+ Add Answer</button>
                    <button class="btn btn-cyan" onclick="saveNewQuestion()" style="margin-top: 10px;">Save Question</button>
                </div>
                <div>
                    <label>Saved Questions</label>
                    <div id="q-list"></div>
                    <button class="btn btn-ghost" onclick="clearAllData()" style="margin-top: 10px;">Clear All Data</button>
                </div>
            </div>
        </section>

        <section id="game-board">
            <div id="column-wrap">
                <div id="column-outer">
                    <div id="column-fill"></div>
                    <div id="score-notch">100</div>
                </div>
                <div style="text-align: center; color: var(--gold); font-weight: bold; margin-top: 10px;">0</div>
            </div>

            <div id="display-panel">
                <select id="question-select" class="inp" onchange="loadQuestion(this.value)">
                    <option value="">— Select a question —</option>
                </select>

                <div id="q-display">Ready to play? Select a question.</div>
                
                <div style="margin-bottom: 20px;">
                    <input id="answer-input" class="inp" style="font-size: 24px; width: 70%;" placeholder="TYPE ANSWER...">
                    <button id="submit-btn" onclick="submitAnswer()">SUBMIT</button>
                </div>

                <div id="history-list" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
            </div>
        </section>
    </div>

    <script>
        let questions = JSON.parse(localStorage.getItem('pointless_data')) || [];
        let currentQuestion = null;

        const adminToggle = document.getElementById('admin-toggle');
        const adminPanel = document.getElementById('admin-panel');

        adminToggle.onclick = () => adminPanel.classList.toggle('hidden');

        function createAnswerRow(ans = '', pts = '') {
            const div = document.createElement('div');
            div.className = 'answer-row';
            div.style.display = 'flex';
            div.style.gap = '5px';
            div.style.marginTop = '5px';
            div.innerHTML = `<input class="inp ans-text" value="${ans}" placeholder="Answer"><input class="inp ans-pts" type="number" value="${pts}" style="width: 60px;" placeholder="Pts">`;
            document.getElementById('answers-builder').appendChild(div);
        }

        function saveNewQuestion() {
            const title = document.getElementById('q-title-inp').value;
            const rows = document.querySelectorAll('.answer-row');
            let ansArr = [];
            rows.forEach(row => {
                ansArr.push({ 
                    text: row.querySelector('.ans-text').value.toLowerCase().trim(), 
                    points: parseInt(row.querySelector('.ans-pts').value) 
                });
            });
            questions.push({ title, answers: ansArr });
            localStorage.setItem('pointless_data', JSON.stringify(questions));
            updateUI();
        }

        function updateUI() {
            const select = document.getElementById('question-select');
            const list = document.getElementById('q-list');
            select.innerHTML = '<option value="">— Select —</option>';
            list.innerHTML = '';
            questions.forEach((q, i) => {
                select.innerHTML += `<option value="${i}">${q.title}</option>`;
                list.innerHTML += `<div style="padding: 5px; border-bottom: 1px solid #222;">${q.title}</div>`;
            });
        }

        function loadQuestion(index) {
            if (index === "") return;
            currentQuestion = questions[index];
            document.getElementById('q-display').innerText = currentQuestion.title;
            resetBoard();
        }

        function resetBoard() {
            document.getElementById('column-fill').style.height = '100%';
            document.getElementById('score-notch').style.bottom = '100%';
            document.getElementById('score-notch').innerText = '100';
            document.getElementById('history-list').innerHTML = '';
        }

        async function submitAnswer() {
            const input = document.getElementById('answer-input').value.toLowerCase().trim();
            const match = currentQuestion.answers.find(a => a.text === input);
            
            if (match) {
                animateDrop(match.points);
            } else {
                document.getElementById('red-flash').classList.add('flash-anim');
                setTimeout(() => document.getElementById('red-flash').classList.remove('flash-anim'), 500);
            }
            document.getElementById('answer-input').value = '';
        }

        function animateDrop(target) {
            let current = 100;
            const fill = document.getElementById('column-fill');
            const notch = document.getElementById('score-notch');
            
            const interval = setInterval(() => {
                if (current <= target) {
                    clearInterval(interval);
                    if (target === 0) document.getElementById('pointless-overlay').classList.add('active');
                } else {
                    current--;
                    fill.style.height = current + '%';
                    notch.style.bottom = current + '%';
                    notch.innerText = current;
                }
            }, 50);
        }

        function clearAllData() {
            localStorage.clear();
            questions = [];
            updateUI();
        }

        createAnswerRow();
        updateUI();
    </script>
</body>
</html>
